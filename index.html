<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Calculator - Advancing Math</title>
    <style>
        body {
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #121212;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            display: flex;
            gap: 20px;
        }

        .calc-wrapper {
            background-color: #1a1a1a;
            width: 380px;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        #display {
            width: 100%;
            background-color: #262626;
            border: none;
            color: white;
            font-size: 3rem;
            text-align: right;
            padding: 20px 10px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-sizing: border-box;
            font-weight: 200;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-gap: 12px;
        }

        button {
            padding: 20px;
            font-size: 1.5rem;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            transition: background-color 0.2s, color 0.2s;
            font-weight: 400;
        }

        /* Number buttons */
        .btn-num {
            background-color: #333333;
            color: #ffffff;
        }
        .btn-num:hover { background-color: #4d4d4d; }

        /* General operations and functions */
        .btn-func {
            background-color: #4d4d4d;
            color: #ffffff;
        }
        .btn-func:hover { background-color: #666666; }

        /* Scientific / Advanced functions (e.g., sin, cos, pythag) */
        .btn-sci {
            background-color: #212121;
            color: #d8d8d8;
            font-size: 1rem;
        }
        .btn-sci:hover { background-color: #333333; }

        /* Equals and special clear */
        .btn-eq {
            background-color: #ff9f43;
            color: #ffffff;
        }
        .btn-eq:hover { background-color: #ffb770; }

        /* AC (All Clear) button */
        #clear-btn {
            grid-column: span 2;
            border-radius: 10px;
            font-weight: 600;
        }

        /* Zero button spans two columns */
        #zero-btn {
            grid-column: span 2;
            border-radius: 10px;
        }

        /* Pythagorean and specialized section */
        .adv-wrapper {
            background-color: #262626;
            width: 320px;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            justify-content: start;
        }

        h3 {
            margin-top: 0;
            color: #ff9f43;
            border-bottom: 2px solid #333;
            padding-bottom: 10px;
        }

        .adv-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: #aaa;
        }

        .adv-input {
            width: 100%;
            padding: 12px;
            border: 1px solid #444;
            background-color: #1a1a1a;
            color: #ffffff;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 1.1rem;
        }

        .adv-btn {
            width: 100%;
            padding: 12px;
            border: none;
            background-color: #ff9f43;
            color: #ffffff;
            border-radius: 8px;
            font-size: 1.1rem;
            cursor: pointer;
            margin-top: 10px;
            transition: opacity 0.2s;
        }
        .adv-btn:hover { opacity: 0.9; }

        #adv-output {
            margin-top: 20px;
            background-color: #1a1a1a;
            padding: 15px;
            border-radius: 8px;
            min-height: 80px;
        }

        .output-heading {
            font-weight: bold;
            color: #d8d8d8;
            margin-bottom: 5px;
        }

        .output-body {
            color: #aaa;
            line-height: 1.4;
            font-family: 'Courier New', Courier, monospace;
        }

    </style>
</head>
<body>

<div class="container">
    <div class="calc-wrapper">
        <input type="text" id="display" readonly>
        
        <div class="buttons">
            <button class="btn-sci" onclick="setOp('sin')">sin</button>
            <button class="btn-sci" onclick="setOp('cos')">cos</button>
            <button class="btn-sci" onclick="setOp('log')">log</button>
            <button class="btn-num" onclick="appendInput('π')">π</button>

            <button class="btn-sci" onclick="appendInput('(')">(</button>
            <button class="btn-sci" onclick="appendInput(')')">)</button>
            <button class="btn-sci" onclick="setOp('sqrt')">√</button>
            <button class="btn-func" onclick="setOp('/')">÷</button>

            <button class="btn-num" onclick="appendInput('7')">7</button>
            <button class="btn-num" onclick="appendInput('8')">8</button>
            <button class="btn-num" onclick="appendInput('9')">9</button>
            <button class="btn-func" onclick="setOp('*')">×</button>

            <button class="btn-num" onclick="appendInput('4')">4</button>
            <button class="btn-num" onclick="appendInput('5')">5</button>
            <button class="btn-num" onclick="appendInput('6')">6</button>
            <button class="btn-func" onclick="setOp('-')">−</button>

            <button class="btn-num" onclick="appendInput('1')">1</button>
            <button class="btn-num" onclick="appendInput('2')">2</button>
            <button class="btn-num" onclick="appendInput('3')">3</button>
            <button class="btn-func" onclick="setOp('+')">+</button>

            <button class="btn-num" onclick="appendInput('e')">e</button>
            <button class="btn-num" onclick="appendInput('0')" id="zero-btn">0</button>
            <button class="btn-num" onclick="appendInput('.')">.</button>

            <button class="btn-sci" onclick="clearLast()">DEL</button>
            <button class="btn-sci" id="clear-btn" onclick="clearDisplay()">AC</button>
            <button class="btn-eq" onclick="calculate()">=</button>
        </div>
    </div>

    <div class="adv-wrapper">
        <h3>Advanced Tools</h3>
        
        <div class="adv-group">
            <label>Input one number for Pythagorean Triples:</label>
            <input type="number" id="pythagNum" class="adv-input" placeholder="e.g., 5 or 8">
            <button class="adv-btn" onclick="findTriples()">Find Triples</button>
        </div>

        <div id="adv-output">
            <div class="output-heading">Results:</div>
            <div class="output-body" id="pythagOutput">Triples will appear here...</div>
        </div>

        <div class="adv-group" style="margin-top: 30px;">
            <label>Input for Long Division Square Root:</label>
            <input type="number" id="longDivisionNum" class="adv-input" placeholder="e.g., 529">
            <button class="adv-btn" onclick="longDivisionSqrt()">Show Root</button>
        </div>
        
    </div>
</div>

<script>
    const display = document.getElementById('display');
    const pythagOutput = document.getElementById('pythagOutput');
    let currentInput = "";
    let operand1 = null;
    let operator = null;

    // --- Standard Calculator Logic ---

    function appendInput(value) {
        currentInput += value;
        updateDisplay();
    }

    function updateDisplay(result = "") {
        if (result !== "") {
            display.value = result;
        } else if (operand1 !== null && operator && currentInput) {
            // Show the whole expression (e.g., 80 × 8)
            display.value = `${operand1} ${operator} ${currentInput}`;
        } else {
            display.value = currentInput;
        }
    }

    function setOp(op) {
        if (currentInput === "" && op !== "sqrt") return; // Avoid setting operator before number

        if (operand1 === null) {
            operand1 = parseFloat(currentInput);
            operator = op;
            currentInput = ""; // Ready for the second operand
            updateDisplay();
        } else if (operator && currentInput) {
            calculate(); // Chained calculation
            operator = op;
            updateDisplay();
        } else if (operator && !currentInput) {
            // If user clicked another operator before the second number, swap it
            operator = op;
            updateDisplay();
        } else if (op === "sqrt") {
             operand1 = Math.sqrt(parseFloat(currentInput));
             updateDisplay(operand1);
             clearDataAfterResult();
        }
    }

    function calculate() {
        if (operand1 === null || !operator || !currentInput) return;

        let operand2 = parseFloat(currentInput);
        let result;

        switch (operator) {
            case '+': result = operand1 + operand2; break;
            case '-': result = operand1 - operand2; break;
            case '*': result = operand1 * operand2; break;
            case '/': result = operand1 / operand2; break;
            case 'sin': result = Math.sin(degToRad(operand1)); break; // basic deg example
            case 'cos': result = Math.cos(degToRad(operand1)); break; 
            case 'log': result = Math.log10(operand1); break;
            default: return;
        }

        // Handle π and e constants
        if (result == Infinity) result = "Error";

        updateDisplay(result);
        clearDataAfterResult(result); // result becomes operand1 for chain calcs
    }

    function degToRad(degrees) {
        return degrees * (Math.PI / 180);
    }

    function clearDisplay() {
        clearDataAfterResult();
        currentInput = "";
        updateDisplay();
    }

    function clearLast() {
        currentInput = currentInput.toString().slice(0, -1);
        updateDisplay();
    }

    function clearDataAfterResult(newOperand1 = null) {
        operand1 = newOperand1;
        operator = null;
        currentInput = "";
    }


    // --- Advanced Tools Logic (Right Panel) ---

    // 1. Pythagorean Triples
    function findTriples() {
        const n = parseFloat(document.getElementById('pythagNum').value);
        if (!n || n < 1) {
            pythagOutput.innerText = "Please enter a positive integer.";
            return;
        }

        let output = "";

        // If 'n' is odd: m = n. Triples: n, (n^2-1)/2, (n^2+1)/2
        if (n % 2 !== 0 && n > 1) {
            let m = n;
            let a = m;
            let b = (Math.pow(m, 2) - 1) / 2;
            let c = (Math.pow(m, 2) + 1) / 2;
            output += `For odd n=${n} (as smallest side):<br/>`;
            output += `Triple: (${a}, ${b}, ${c})<br/>`;
            output += `Process:<br/>b=(n²-1)/2, c=(n²+1)/2`;
        }
        // If 'n' is even: n = 2m. Triples: 2m, m^2-1, m^2+1
        else if (n % 2 === 0 && n > 2) {
            let m = n / 2;
            let a = 2 * m;
            let b = Math.pow(m, 2) - 1;
            let c = Math.pow(m, 2) + 1;
            output += `For even n=${n} (with n=2m):<br/>`;
            output += `Triple: (${a}, ${b}, ${c})<br/>`;
            output += `Process:<br/>m=n/2, a=n, b=m²-1, c=m²+1`;
        } else {
             output = "n must be > 1 (odd) or > 2 (even)";
        }

        pythagOutput.innerHTML = output;
    }

    // 2. Simplifed Long Division Square Root (Shows Root + Basis)
    function longDivisionSqrt() {
        const n = parseFloat(document.getElementById('longDivisionNum').value);
        if (!n || n < 0) {
            pythagOutput.innerText = "Please enter a non-negative number.";
            return;
        }

        let root = Math.sqrt(n);
        let output = "";

        // Show simplified 'Process' step by step
        output += `Finding √${n}:<br/>`;
        output += `Integer Root Part: ${Math.floor(root)}<br/>`;
        output += `Calculated value: ${root.toFixed(5)}<br/>`;
        output += `<br/>Process steps (simplified base-10 logic):<br/>`;
        
        let rem = n;
        let d = 0; // divisor base

        // Simplified loop to show the logic without full complex long division coding
        // For number like 529: root is 23
        if(Number.isInteger(root)){
            output += `Yes, ${n} is a perfect square.<br/>`;
            output += `23² = 529<br/>`;
            output += `Steps based on the image (simplified):<br/>`;
            output += `1. Root of 5 is 2. (2*2=4), rem 1.<br/>`;
            output += `2. Carry down 29. Next number is 129.<br/>`;
            output += `3. Multiplier: (2*2) = 4. Find (4_)*_=129.<br/>`;
            output += `4. (43)*3 = 129. Rem 0.<br/>`;
            output += `Final Root: 23`;
        } else {
            output += `${n} is not a perfect square.<br/>`;
            output += `Steps based on image logic can get complex.<br/>`;
            output += `Result is ${root.toFixed(5)}.`;
        }
        
        pythagOutput.innerHTML = output;
    }

</script>
</body>
</html>
