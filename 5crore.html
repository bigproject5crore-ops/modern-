<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Calculator</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #121212; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        
        .calculator { background: #000; width: 320px; padding: 20px; border-radius: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        
        #display { 
            width: 100%; height: 100px; background: transparent; border: none; 
            color: white; text-align: right; font-size: 3rem; margin-bottom: 20px; outline: none; 
        }

        .buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }

        button { 
            height: 65px; border-radius: 50%; border: none; font-size: 1.5rem; cursor: pointer; 
            transition: opacity 0.2s; font-weight: 500;
        }
        button:active { opacity: 0.5; }

        .number { background-color: #333; color: white; }
        .operator { background-color: #f69906; color: white; }
        .special { background-color: #a5a5a5; color: black; }
        .equal { background-color: #f69906; color: white; }
        .zero { grid-column: span 2; border-radius: 40px; text-align: left; padding-left: 25px; }

    </style>
</head>
<body>

<div class="calculator">
    <input type="text" id="display" disabled placeholder="0">
    <div class="buttons">
        <button class="special" onclick="clearDisplay()">AC</button>
        <button class="special" onclick="deleteLast()">DEL</button>
        <button class="special" onclick="appendToDisplay('%')">%</button>
        <button class="operator" onclick="appendToDisplay('/')">÷</button>

        <button class="number" onclick="appendToDisplay('7')">7</button>
        <button class="number" onclick="appendToDisplay('8')">8</button>
        <button class="number" onclick="appendToDisplay('9')">9</button>
        <button class="operator" onclick="appendToDisplay('*')">×</button>

        <button class="number" onclick="appendToDisplay('4')">4</button>
        <button class="number" onclick="appendToDisplay('5')">5</button>
        <button class="number" onclick="appendToDisplay('6')">6</button>
        <button class="operator" onclick="appendToDisplay('-')">-</button>

        <button class="number" onclick="appendToDisplay('1')">1</button>
        <button class="number" onclick="appendToDisplay('2')">2</button>
        <button class="number" onclick="appendToDisplay('3')">3</button>
        <button class="operator" onclick="appendToDisplay('+')">+</button>

        <button class="number zero" onclick="appendToDisplay('0')">0</button>
        <button class="number" onclick="appendToDisplay('.')">.</button>
        <button class="equal" onclick="calculate()">=</button>
    </div>
</div>

<script>
    let display = document.getElementById('display');

    function appendToDisplay(input) {
        display.value += input;
    }

    function clearDisplay() {
        display.value = "";
    }

    function deleteLast() {
        display.value = display.value.slice(0, -1);
    }

    function calculate() {
        try {
            // eval() function mathematical string ko calculate karta hai
            display.value = eval(display.value);
        } catch (error) {
            display.value = "Error";
        }
    }
</script>

</body>
</html>
